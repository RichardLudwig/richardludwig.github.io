<div class="container">
    <div class="row">
      <div class="col-md">
        <h4 class="font-weight-bold spanborder"><span>Tutorials</span></h4>  
            <ol class="list-featured">				
                {% for post in site.tags.tutorials reversed limit:3 %}                
                    <li class="mb-4">
                    <span>
                        <h6 class="font-weight-bold">
                            <a href="{{site.baseurl}}{{ post.url }}" class="text-dark">{{ post.title }}</a>
                        </h6>
                        <p class="d-block text-muted">{{ post.pitch }}</p>
                    </span>
                    </li>                
                {% endfor %}   
            </ol>
      </div>
      <div class="col-sm">
        <h4 class="font-weight-bold spanborder"><span>Featured</span></h4>  
            <ol class="list-featured">				
                {% for post in site.tags.featured reversed limit:3 %}                
                    <li class="mb-4">
                    <span>
                        <h6 class="font-weight-bold">
                            <a href="{{site.baseurl}}{{ post.url }}" class="text-dark">{{ post.title }}</a>
                        </h6>
                        <p class="d-block text-muted">{{ post.pitch }}</p>
                    </span>
                    </li>                
                {% endfor %}   
            </ol>
      </div>
    </div>
  </div>
